name: Парсинг банкротств

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 08:00 МСК (для синхронизации)
  workflow_dispatch:     # Возможность запустить вручную

jobs:
  sync:  # ← Переименовали job в "sync" (только синхронизация, без парсинга)
    runs-on: ubuntu-latest
    timeout-minutes: 30  # ← Уменьшили время (парсинга нет, только коммит)
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ← Важно для git push

      - name: 🔄 Синхронизируем отчёты из ПК
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/
          git commit -m "🔄 Sync от ПК $(date +'%Y-%m-%d %H:%M MSK')" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
