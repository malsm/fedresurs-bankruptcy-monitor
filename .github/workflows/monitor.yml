name: Fedresurs Bankruptcy Monitor

on:
  schedule:
    - cron: '0 6 * * *' # Запуск каждый день в 9:00 по МСК
  workflow_dispatch: # Возможность ручного запуска

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl tqdm nest_asyncio

      - name: Install Playwright Browsers and Deps
        run: npx playwright install --with-deps chromium # КРИТИЧНО: ставит библиотеки системы

      - name: Run script
        run: python script.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fedresurs-reports
          path: |
            fedresurs_*.xlsx
            fedresurs_*.html
